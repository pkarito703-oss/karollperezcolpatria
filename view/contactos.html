<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLPATRIA - Contacto</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <header>
        <div class="logo_area">
            <img src="../img/img_colpatria.png" alt="">
        </div>
    </header>

    
    <div class="contenedor-imagen">
        <div class="contenedor-imagen">
        <nav class="nav-lateral">
            <a href="../index.html" title="Inicio"><img src="../img/inicio.png" alt="Inicio"></a>
            <a href="servicios.html" title="Servicios"><img src="../img/servicios.png" alt="Servicios"></a>
            <a href="#" title="Contacto"><img src="../img/contacto.png" alt="Contacto"></a>
        </nav>
        <img src="img/img_colpatria_inicio.png" alt="Colpatria">
    </div>
        <img src="img/img_colpatria_inicio.png" alt="Colpatria">
    </div>

    <div class="container">

        <section class="formulario-contacto">
            <h2>Formulario de contacto</h2>

            <label for="cc">Cédula</label>
            <input type="number" id="cc" name="cc" placeholder="Número de cédula...">

            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" name="nombres" placeholder="Tus nombres...">

            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos...">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Tu correo electrónico...">

            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Tu usuario...">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Tu contraseña...">

            <label for="rol">Rol</label>
            <select id="rol" name="rol">
                <option value="administrador">Administrador</option>
                <option value="usuario">Usuario</option>
                <option value="editor">Editor</option>
            </select>

            <button class="btn-submit" type="button">Enviar</button>
        </section>

    </div>

    <footer>
        <p>Página web realizada para fines netamente académicos por: Karoll Juliana Perez Rangel &copy; 2026</p>
        <p>Encuéntranos en nuestras redes sociales</p>
        <div class="redes-sociales">
            <a href="https://www.facebook.com/colpatria" target="_blank"><img src="../img/img_face.png" alt="Facebook"></a>
            <a href="https://www.pinterest.com" target="_blank"><img src="../img/img_pinteres.png" alt="Pinterest"></a>
            <a href="https://www.instagram.com/colpatria" target="_blank"><img src="../img/img_ig.png" alt="Instagram"></a>
        </div>
    </footer>

</body>
</html>
